name: ZikirHatmi
options:
  bundleIdPrefix: com.zikirhatmi
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: tr
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ZikirHatmi:
    type: application
    platform: iOS
    sources:
      - path: ZikirHatmi
        excludes:
          - Info.plist
          - Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zikirhatmi.app
        INFOPLIST_FILE: ZikirHatmi/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZikirHatmi/ZikirHatmi.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
    entitlements:
      path: ZikirHatmi/ZikirHatmi.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:zikirhatmi.abapnews.tr
schemes:
  ZikirHatmi:
    build:
      targets:
        ZikirHatmi: all
    run:
      config: Debug
    archive:
      config: Release
