services:
  db:
    image: postgres:16-alpine
    container_name: zikir-hatmi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: zikirhatmi
      POSTGRES_USER: zikirhatmi
      POSTGRES_PASSWORD: zikirhatmi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - zikirhatmi_db:/var/lib/postgresql/data

  backend:
    build:
      context: ./zikir-hatmi-backend
    container_name: zikir-hatmi-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://zikirhatmi:zikirhatmi@db:5432/zikirhatmi?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "8998:8080"

  frontend:
    build:
      context: ./zikir-hatmi-frontend
    container_name: zikir-hatmi-frontend
    restart: unless-stopped
    environment:
      # Local dev: proxy API + WebSocket to the backend service inside the compose network.
      VITE_PROXY_TARGET: "http://backend:8080"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8999:5173"

volumes:
  zikirhatmi_db:
