services:
  db:
    image: postgres:16-alpine
    container_name: zikir-hatmi-db
    environment:
      POSTGRES_DB: zikirhatmi
      POSTGRES_USER: zikirhatmi
      POSTGRES_PASSWORD: zikirhatmi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - zikirhatmi_db:/var/lib/postgresql/data

  backend:
    build:
      context: ./zikir-hatmi-backend
    container_name: zikir-hatmi-backend
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://zikirhatmi:zikirhatmi@db:5432/zikirhatmi?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8998:8080"

  frontend:
    build:
      context: ./zikir-hatmi-frontend
    container_name: zikir-hatmi-frontend
    environment:
      VITE_PROXY_TARGET: "https://zikirhatmiapi.abapnews.tr"
    depends_on:
      - backend
    ports:
      - "8999:5173"

volumes:
  zikirhatmi_db:
